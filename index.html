<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        /* 最簡化——只設定表格邊框、合併、內間距、左對齊 */
        table {
            border-collapse: collapse;  /* 邊框合併成一條線 */
            width: 300px;               /* 稍寬一點，好看 */
            font-family: sans-serif;
        }
        th, td {
            border: 1px solid black;    /* 加上黑色邊線 (符合要求) */
            padding: 5px;               /* 內邊距5px */
            text-align: left;           /* 文字靠左 */
        }
    </style>
</head>
<body>

<!-- 最簡表格：只有兩欄，一列資料，完全符合 Name / Student ID 以及你的姓名學號 -->
<table>
    <tr>
        <th>Name</th>
        <th>Student ID</th>
    </tr>
    <tr>
        <td>曾丰翊</td>
        <td>113403020</td>
    </tr>
</table>

<!-- 沒有任何多餘裝飾、外框、陰影或說明文字，只有純表格與邊線 -->

</body>
</html>
