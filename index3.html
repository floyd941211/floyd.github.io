<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG 圓形與矩形重疊</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SVG 圓形與矩形重疊</h1>
        
        <svg width="200" height="200" style="border: 1px solid #ccc; background-color: white;">
            <rect x="20" y="20" width="100" height="100" 
                  fill="blue" stroke="black" stroke-width="3" />
            
            <circle cx="100" cy="80" r="50" 
                    fill="yellow" stroke="red" stroke-width="3" />
        </svg>

        <p>這是一個包含重疊圓形和矩形的網頁。</p>
    </div>

</body>
</html>
