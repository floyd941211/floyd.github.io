<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>CSS 圖片樣式練習</title>
    <style>
        /* 1. 只有一個大容器負責橫向排隊 */
        .gallery {
            display: flex;
            justify-content: space-around; /* 讓三組平均分配空間 */
            align-items: center;
            text-align: center; /* 讓文字標籤置中 */
            padding: 20px;
        }

        /* 讓每一組「圖片+文字」垂直排列 */
        .item-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 33%; /* 確保每一組佔 1/3 寬度 */
        }

        .left-img {
            width: 100%; /* 寬度跟隨父層的 33% */
            height: 300px;
            border-radius: 18px;
            object-fit: cover;
        }

        .center-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 1px solid black;
            object-fit: cover;
        }

        .right-img {
            width: 100%; /* 寬度跟隨父層的 33% */
            height: 300px;
            object-fit: fill; 
        }

        .label {
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="gallery">
        
        <div class="item-group">
            <img src="https://picsum.photos/id/43/800/1200" class="left-img" alt="Eiffel Tower">
            <div class="label">no distortion (cover)</div>
        </div>

        <div class="item-group">
            <img src="https://picsum.photos/id/10/500/500" class="center-img" alt="Mountain">
            <div class="label">border 150px</div>
        </div>

        <div class="item-group">
            <img src="https://picsum.photos/id/43/800/1200" class="right-img" alt="Eiffel Tower">
            <div class="label" style="color: red;">distortion (fill)</div>
        </div>

    </div>

</body>
</html>
