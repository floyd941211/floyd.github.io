<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Life: 24H 碳足跡模擬器</title>
    <style>
        :root {
            --earth-color: #4caf50;
            --bg-overlay: rgba(0,0,0,0);
        }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5; color: #333; transition: background 0.5s;
        }

        /* 頂部固定儀表板 */
        .dashboard {
            position: fixed; top: 0; width: 100%; background: white;
            padding: 20px; box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            display: flex; justify-content: space-around; z-index: 100;
        }

        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--earth-color); }

        /* 核心地球視覺 */
        .earth-container {
            margin-top: 120px; text-align: center; position: relative;
        }
        #earth-emoji {
            font-size: 8rem; display: inline-block; transition: transform 0.3s;
        }

        /* 題目區塊 */
        .scrolling-content { padding: 20px; max-width: 800px; margin: 0 auto; }
        .question-card {
            background: white; border-radius: 20px; padding: 30px;
            margin-bottom: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transform: translateY(20px); opacity: 0; transition: 0.6s;
        }
        .question-card.active { transform: translateY(0); opacity: 1; }

        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        button {
            flex: 1; padding: 15px; border: none; border-radius: 10px;
            cursor: pointer; font-size: 1rem; font-weight: 600;
            transition: 0.2s; background: #e4e6eb;
        }
        button:hover { background: #d8dadf; }
        button.selected { background: var(--earth-color); color: white; }

        /* 結局遮罩 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay); pointer-events: none; z-index: 50;
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <div class="dashboard">
        <div class="stat-item">
            <div>累積排放量</div>
            <div id="total-carbon" class="stat-value">0.00</div>
            <small>kg CO2e</small>
        </div>
        <div class="stat-item">
            <div>環境壓力值</div>
            <div id="stress-level" class="stat-value">0%</div>
        </div>
    </div>

    <div class="earth-container">
        <div id="earth-emoji">🌍</div>
    </div>

    <div class="scrolling-content">
        <!-- 題目 1 -->
        <div class="question-card active" id="q1">
            <h3>早晨：你的交通工具？</h3>
            <p>不同的代步方式決定了你一天的碳排起點。</p>
            <div class="btn-group">
                <button onclick="selectOption(1, 0.05, '🚲', this)">腳踏車 / 步行</button>
                <button onclick="selectOption(1, 1.20, '🚗', this)">獨自開車 (燃油車)</button>
            </div>
        </div>

        <!-- 題目 2 -->
        <div class="question-card active" id="q2">
            <h3>午餐：飲食選擇？</h3>
            <p>肉類生產（尤其是牛肉）是碳排的主要來源。</p>
            <div class="btn-group">
                <button onclick="selectOption(2, 0.40, '🥗', this)">在地蔬食</button>
                <button onclick="selectOption(2, 2.50, '🥩', this)">進口牛排</button>
            </div>
        </div>

        <!-- 題目 3 -->
        <div class="question-card active" id="q3">
            <h3>夏季：空調使用習慣？</h3>
            <p>冷氣溫度的設定對電力消耗影響極大。</p>
            <div class="btn-group">
                <button onclick="selectOption(3, 0.20, '🍃', this)">26度 + 電風扇</button>
                <button onclick="selectOption(3, 1.80, '❄️', this)">18度 強力運轉</button>
            </div>
        </div>

        <div id="final-result" style="text-align: center; padding: 50px; display: none;">
            <h2 id="result-title">測驗完成</h2>
            <p id="result-desc"></p>
            <button onclick="location.reload()" style="margin-top: 20px; background: #333; color: white;">重新模擬</button>
        </div>
    </div>

    <script>
        let scores = { 1: 0, 2: 0, 3: 0 };
        let totalCarbon = 0;

        function selectOption(qId, value, emoji, btn) {
            // 更新得分
            scores[qId] = value;
            
            // UI 視覺回饋：處理按鈕樣式
            const parent = btn.parentElement;
            parent.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');

            updateCalculations();
        }

        function updateCalculations() {
            totalCarbon = Object.values(scores).reduce((a, b) => a + b, 0);
            
            // 更新數字
            document.getElementById('total-carbon').innerText = totalCarbon.toFixed(2);
            
            // 計算壓力百分比 (假設 5kg 是極限)
            let stress = Math.min((totalCarbon / 5) * 100, 100);
            document.getElementById('stress-level').innerText = Math.floor(stress) + "%";

            // 改變地球顏色與狀態
            const earth = document.getElementById('earth-emoji');
            if (stress > 70) {
                earth.innerText = "🌋";
                document.documentElement.style.setProperty('--earth-color', '#ff5252');
                document.documentElement.style.setProperty('--bg-overlay', 'rgba(255,0,0,0.1)');
                earth.style.transform = `scale(${1 + stress/200}) rotate(5deg)`;
            } else if (stress > 30) {
                earth.innerText = "🌍";
                document.documentElement.style.setProperty('--earth-color', '#ff9800');
                document.documentElement.style.setProperty('--bg-overlay', 'rgba(0,0,0,0)');
                earth.style.transform = `scale(1.1)`;
            } else {
                earth.innerText = "🍀";
                document.documentElement.style.setProperty('--earth-color', '#4caf50');
                earth.style.transform = `scale(1)`;
            }

            // 檢查是否完成所有題目以顯示結果
            if (scores[1] > 0 && scores[2] > 0 && scores[3] > 0) {
                showResult();
            }
        }

        function showResult() {
            const resDiv = document.getElementById('final-result');
            const desc = document.getElementById('result-desc');
            resDiv.style.display = 'block';

            if (totalCarbon < 1.5) {
                desc.innerText = "你是低碳楷模！你的生活方式與巴黎氣候協定目標一致。";
            } else if (totalCarbon < 3.5) {
                desc.innerText = "你的排碳量處於平均水準，仍有改善空間。";
            } else {
                desc.innerText = "警報！你的生活方式對地球造成極大壓力，建議從飲食與交通開始減碳。";
            }
            resDiv.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
